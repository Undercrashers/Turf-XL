spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    issuer: turfxl-baisakhi
  otp:
    length: 6
    expiry-seconds: 300
    max-attempts: 5
  cors:
    allowed-origins: ${FRONTEND_ORIGIN}
