spring:
  datasource:
    url: jdbc:h2:mem:turfxl_dev;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        from:
          name: Turf-XL

app:
  jwt:
    secret: CHANGE_ME_IN_PROD_this_is_only_for_local_development_turfxl_secret_key_2026
    expiration-ms: 86400000   # 24h
    issuer: turfxl-baisakhi

  otp:
    length: 6
    expiry-seconds: 300
    max-attempts: 5

  cors:
    allowed-origins: http://localhost:5173

# ------------------------------------------------------------------
# NOTE: dev uses H2 in-memory DB so you can boot without MySQL.
#       For MySQL locally, copy this block into application-local.yml
#       and activate with --spring.profiles.active=local
#
# spring.datasource.url: jdbc:mysql://localhost:3306/turfxl_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: root
# spring.datasource.password: root
# spring.jpa.properties.hibernate.dialect: org.hibernate.dialect.MySQLDialect
# ------------------------------------------------------------------
